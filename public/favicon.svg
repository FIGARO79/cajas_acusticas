<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="speakerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#863bff" />
    </linearGradient>
  </defs>
  <!-- Gabinete Exterior (Lineas) -->
  <rect x="80" y="40" width="352" height="432" rx="48" stroke="url(#speakerGrad)" stroke-width="24" stroke-linejoin="round" fill="none"/>
  
  <!-- Tweeter (Bafle de agudos) -->
  <circle cx="256" cy="160" r="48" stroke="url(#speakerGrad)" stroke-width="20" fill="none"/>
  <circle cx="256" cy="160" r="16" stroke="url(#speakerGrad)" stroke-width="12" fill="none"/>
  
  <!-- Woofer (Bafle de graves) -->
  <circle cx="256" cy="330" r="96" stroke="url(#speakerGrad)" stroke-width="20" fill="none"/>
  <circle cx="256" cy="330" r="36" stroke="url(#speakerGrad)" stroke-width="16" fill="none"/>
  
  <!-- Detalle exterior del woofer (Concéntrico fino discontinuo) -->
  <circle cx="256" cy="330" r="116" stroke="url(#speakerGrad)" stroke-width="6" stroke-dasharray="16 12" fill="none"/>
</svg>